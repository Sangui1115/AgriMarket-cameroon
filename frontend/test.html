<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Backend</title>
</head>
<body>
    <h1>Test fetch Backend</h1>
    <button id="testBtn">Tester la connexion</button>

    <script>
        const API_URL = "http://localhost:3000/api/users/test";

        document.getElementById('testBtn').addEventListener('click', async () => {
            try {
                const res = await fetch(API_URL);
                const text = await res.text();
                console.log("Réponse du backend :", text);
                alert("Réponse : " + text);
            } catch (err) {
                console.error("Erreur fetch :", err);
                alert("Erreur fetch : voir console");
            }
        });
    </script>
</body>
</html>
