<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planifier une rencontre</title>
  <style>
    body { font-family: Arial; background:#0b1f2f; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:#112c44; padding:30px; border-radius:10px; width:350px; }
    input, button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; }
    button { background:#22c55e; color:white; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Planifier une rencontre</h2>
  <input type="text" id="nom" placeholder="Votre nom" required>
  <input type="datetime-local" id="date" required>
  <button onclick="sendRequest()">Envoyer la demande</button>
  <p id="msg"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get("productId");

async function sendRequest() {
  const nom = document.getElementById("nom").value;
  const date = document.getElementById("date").value;

  if (!nom || !date) {
    alert("Veuillez remplir tous les champs");
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/api/rencontres/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        product_id: productId,
        client_nom: nom,
        date_rencontre: date
      })
    });

    const data = await res.json();
    alert(data.message);

  } catch (err) {
    console.error(err);
    alert("Erreur serveur");
  }
}
</script>

</body>
</html>
